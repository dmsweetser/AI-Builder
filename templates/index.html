
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Builder - Project Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="bg-dark text-light">
    <div class="container mt-4">
        <h1 class="text-center mb-4 blockworldstyle-title">AI BUILDER PROJECT MANAGER</h1>
        
        <div class="row">
            <div class="col-lg-6">
                <div class="blockworldstyle-box p-4">
                    <h3 class="mb-3">Project Configuration</h3>
                    <form id="projectForm">
                        <input type="hidden" id="projectId">
                        <div class="mb-3">
                            <label class="form-label">Project ID</label>
                            <input type="text" class="form-control blockworldstyle-input" id="id" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Instructions</label>
                            <textarea class="form-control blockworldstyle-input" id="instructions" rows="4" required></textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Pre-Script (PowerShell)</label>
                            <textarea class="form-control blockworldstyle-input" id="pre_script" rows="3"></textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Post-Script (PowerShell)</label>
                            <textarea class="form-control blockworldstyle-input" id="post_script" rows="3"></textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Filter Mode</label>
                            <select class="form-select blockworldstyle-input" id="mode">
                                <option value="exclude">Exclude Patterns</option>
                                <option value="include">Include Patterns</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Patterns (one per line)</label>
                            <textarea class="form-control blockworldstyle-input" id="patterns" rows="4" placeholder="*.log&#10;temp/&#10;build/"></textarea>
                        </div>
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn blockworldstyle-btn" id="saveBtn">Save Project</button>
                            <button type="button" class="btn blockworldstyle-btn btn-warning" id="runBtn">Run Project</button>
                        </div>
                    </form>
                </div>
            </div>
            <div class="col-lg-6">
                <div class="blockworldstyle-box p-4">
                    <h3 class="mb-3">Project List</h3>
                    <ul class="list-group" id="projectList"></ul>
                    <div class="mt-4">
                        <h4>Execution Log</h4>
                        <pre class="blockworldstyle-log p-3" id="logOutput"></pre>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/script.js"></script>
</body>
</html>
